<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Staff Médico</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        h2 { color: #2c3e50; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #34495e; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #2c3e50; color: white; }
        tr:hover { background: #f9f9f9; }
        .btn-eliminar { background: #e74c3c; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-eliminar:hover { background: #c0392b; }
        .btn-editar { background: #f39c12; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-editar:hover { background: #e67e22; }
        .btn-guardar { background: #27ae60; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-cancelar { background: #95a5a6; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        td input { width: 100%; padding: 4px; border: 1px solid #2c3e50; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        #adminPanel { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        #adminPanel input[type="password"] { width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-right: 10px; }
        .btn-admin { background: #f39c12; font-size: 14px; padding: 8px 16px; }
        .btn-cerrar { background: #95a5a6; font-size: 14px; padding: 8px 16px; }
        .admin-badge { background: #27ae60; color: white; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin-left: 10px; }
        .admin-only { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Directorio de Odontólogos <span id="adminBadge" class="admin-badge" style="display:none;">🔑 Administrador</span></h1>

    <div id="adminPanel">
        <strong>🔒 Acceso Administrador</strong><br><br>
        <div id="loginForm">
            <input type="password" id="claveAdmin" placeholder="Contraseña de admin">
            <button class="btn-admin" onclick="loginAdmin()">Entrar</button>
        </div>
        <div id="logoutForm" style="display:none;">
            <button class="btn-cerrar" onclick="logoutAdmin()">Cerrar sesión admin</button>
        </div>
    </div>

    <div id="formSection" class="admin-only">
        <h2>Agregar Doctor</h2>
        <div class="form-group"><label>Nombre:</label><input type="text" id="nombre" placeholder="Ej: Dr. Juan López"></div>
        <div class="form-group"><label>Especialidad:</label><input type="text" id="especialidad" placeholder="Ej: Ortodoncia"></div>
        <div class="form-group"><label>Cédula:</label><input type="text" id="cedula" placeholder="Número de cédula"></div>
        <div class="form-group"><label>Contacto:</label><input type="text" id="contacto" placeholder="Teléfono / correo"></div>
        <div class="form-group"><label>Horario:</label><input type="text" id="horario" placeholder="Ej: Lun-Vie 09:00-17:00"></div>
        <div class="form-group"><label>Consultorio:</label><input type="text" id="consultorio" placeholder="Ej: Consultorio 2"></div>
        <button onclick="agregarDoctor()">Guardar Doctor</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th><th>Especialidad</th><th>Cédula</th><th>Contacto</th><th>Horario</th><th>Consultorio</th>
                <th class="admin-only" id="colAccion">Acción</th>
            </tr>
        </thead>
        <tbody id="tablaStaff"></tbody>
    </table>
</div>

<script>
    const CLAVE_ADMIN = "admin123";
    let esAdmin = false;

    window.onload = cargarStaff;

    function loginAdmin() {
        if (document.getElementById("claveAdmin").value === CLAVE_ADMIN) {
            esAdmin = true;
            document.querySelectorAll(".admin-only").forEach(el => el.style.display = "block");
            document.getElementById("colAccion").style.display = "table-cell";
            document.getElementById("adminBadge").style.display = "inline";
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("logoutForm").style.display = "block";
            cargarStaff();
        } else { alert("Contraseña incorrecta"); }
    }

    function logoutAdmin() {
        esAdmin = false;
        document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
        document.getElementById("adminBadge").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("logoutForm").style.display = "none";
        document.getElementById("claveAdmin").value = "";
        cargarStaff();
    }

    async function cargarStaff() {
        const res = await fetch("/api/staff");
        const staff = await res.json();
        const tbody = document.getElementById("tablaStaff");
        tbody.innerHTML = "";
        staff.forEach(d => {
            tbody.innerHTML += `
                <tr id="fila-${d._id}">
                    <td id="nombre-${d._id}">${d.nombre}</td>
                    <td id="especialidad-${d._id}">${d.especialidad}</td>
                    <td id="cedula-${d._id}">${d.cedula}</td>
                    <td id="contacto-${d._id}">${d.contacto}</td>
                    <td id="horario-${d._id}">${d.horario}</td>
                    <td id="consultorio-${d._id}">${d.consultorio}</td>
                    ${esAdmin ? `
                    <td>
                        <button class="btn-editar" onclick="editarFila('${d._id}','${d.nombre}','${d.especialidad}','${d.cedula}','${d.contacto}','${d.horario}','${d.consultorio}')">Editar</button>
                        <button class="btn-eliminar" onclick="eliminar('${d._id}')">Eliminar</button>
                    </td>` : ""}
                </tr>`;
        });
    }

    function editarFila(id, nombre, especialidad, cedula, contacto, horario, consultorio) {
        document.getElementById(`nombre-${id}`).innerHTML       = `<input type="text" value="${nombre}">`;
        document.getElementById(`especialidad-${id}`).innerHTML = `<input type="text" value="${especialidad}">`;
        document.getElementById(`cedula-${id}`).innerHTML       = `<input type="text" value="${cedula}">`;
        document.getElementById(`contacto-${id}`).innerHTML     = `<input type="text" value="${contacto}">`;
        document.getElementById(`horario-${id}`).innerHTML      = `<input type="text" value="${horario}">`;
        document.getElementById(`consultorio-${id}`).innerHTML  = `<input type="text" value="${consultorio}">`;
        document.querySelector(`#fila-${id} td:last-child`).innerHTML = `
            <button class="btn-guardar" onclick="guardarEdicion('${id}')">Guardar</button>
            <button class="btn-cancelar" onclick="cargarStaff()">Cancelar</button>`;
    }

    async function guardarEdicion(id) {
        const datos = {
            nombre:       document.querySelector(`#nombre-${id} input`).value,
            especialidad: document.querySelector(`#especialidad-${id} input`).value,
            cedula:       document.querySelector(`#cedula-${id} input`).value,
            contacto:     document.querySelector(`#contacto-${id} input`).value,
            horario:      document.querySelector(`#horario-${id} input`).value,
            consultorio:  document.querySelector(`#consultorio-${id} input`).value
        };
        await fetch(`/api/staff/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });
        await cargarStaff();
    }

    async function agregarDoctor() {
        if (!esAdmin) return;
        const campos = ["nombre","especialidad","cedula","contacto","horario","consultorio"];
        const datos = {};
        for (let c of campos) {
            datos[c] = document.getElementById(c).value;
            if (!datos[c]) { alert("Completa todos los campos"); return; }
        }
        const res = await fetch("/api/staff", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });
        const json = await res.json();
        alert(json.mensaje);
        campos.forEach(c => document.getElementById(c).value = "");
        await cargarStaff();
    }

    async function eliminar(id) {
        if (!confirm("¿Eliminar este doctor?")) return;
        await fetch(`/api/staff/${id}`, { method: "DELETE" });
        await cargarStaff();
    }
</script>
</body>
</html>
