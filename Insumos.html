<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Insumos</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        h2 { color: #16a085; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #16a085; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #1abc9c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; font-size: 13px; }
        th { background: #16a085; color: white; }
        tr:hover { background: #e8f6f3; }
        .stock { font-weight: bold; color: #2980b9; }
        .btn-eliminar { background: #e74c3c; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-eliminar:hover { background: #c0392b; }
        .btn-editar { background: #f39c12; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-editar:hover { background: #e67e22; }
        .btn-guardar { background: #27ae60; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-cancelar { background: #95a5a6; padding: 5px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        td input { width: 100%; padding: 4px; border: 1px solid #16a085; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        #adminPanel { background: #fff8e1; border: 1px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        #adminPanel input[type="password"] { width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-right: 10px; }
        .btn-admin { background: #f39c12; font-size: 14px; padding: 8px 16px; }
        .btn-cerrar { background: #95a5a6; font-size: 14px; padding: 8px 16px; }
        .admin-badge { background: #27ae60; color: white; padding: 4px 10px; border-radius: 4px; font-size: 13px; margin-left: 10px; }
        .admin-only { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Inventario de Insumos Dentales <span id="adminBadge" class="admin-badge" style="display:none;">🔑 Administrador</span></h1>

    <div id="adminPanel">
        <strong>🔒 Acceso Administrador</strong><br><br>
        <div id="loginForm">
            <input type="password" id="claveAdmin" placeholder="Contraseña de admin">
            <button class="btn-admin" onclick="loginAdmin()">Entrar</button>
        </div>
        <div id="logoutForm" style="display:none;">
            <button class="btn-cerrar" onclick="logoutAdmin()">Cerrar sesión admin</button>
        </div>
    </div>

    <div id="formSection" class="admin-only">
        <h2>Agregar Insumo</h2>
        <div class="form-group"><label>Producto:</label><input type="text" id="producto" placeholder="Nombre del producto"></div>
        <div class="form-group"><label>Stock:</label><input type="number" id="stock" placeholder="Cantidad"></div>
        <div class="form-group"><label>Unidad:</label><input type="text" id="unidad" placeholder="Ej: Cajas, Litros"></div>
        <div class="form-group"><label>Proveedor:</label><input type="text" id="proveedor" placeholder="Nombre del proveedor"></div>
        <div class="form-group"><label>Caducidad:</label><input type="text" id="caducidad" placeholder="Ej: 15/12/2026 o N/A"></div>
        <div class="form-group"><label>Ubicación:</label><input type="text" id="ubicacion" placeholder="Ej: Estante B2"></div>
        <button onclick="agregarInsumo()">Guardar Insumo</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Producto</th><th>Stock</th><th>Unidad</th><th>Proveedor</th><th>Caducidad</th><th>Ubicación</th>
                <th class="admin-only" id="colAccion">Acción</th>
            </tr>
        </thead>
        <tbody id="tablaInsumos"></tbody>
    </table>
</div>

<script>
    const CLAVE_ADMIN = "admin123";
    let esAdmin = false;

    window.onload = cargarInsumos;

    function loginAdmin() {
        if (document.getElementById("claveAdmin").value === CLAVE_ADMIN) {
            esAdmin = true;
            document.querySelectorAll(".admin-only").forEach(el => el.style.display = "block");
            document.getElementById("colAccion").style.display = "table-cell";
            document.getElementById("adminBadge").style.display = "inline";
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("logoutForm").style.display = "block";
            cargarInsumos();
        } else { alert("Contraseña incorrecta"); }
    }

    function logoutAdmin() {
        esAdmin = false;
        document.querySelectorAll(".admin-only").forEach(el => el.style.display = "none");
        document.getElementById("adminBadge").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("logoutForm").style.display = "none";
        document.getElementById("claveAdmin").value = "";
        cargarInsumos();
    }

    async function cargarInsumos() {
        const res = await fetch("/api/insumos");
        const insumos = await res.json();
        const tbody = document.getElementById("tablaInsumos");
        tbody.innerHTML = "";
        insumos.forEach(i => {
            tbody.innerHTML += `
                <tr id="fila-${i._id}">
                    <td id="producto-${i._id}">${i.producto}</td>
                    <td id="stock-${i._id}" class="stock">${i.stock}</td>
                    <td id="unidad-${i._id}">${i.unidad}</td>
                    <td id="proveedor-${i._id}">${i.proveedor}</td>
                    <td id="caducidad-${i._id}">${i.caducidad}</td>
                    <td id="ubicacion-${i._id}">${i.ubicacion}</td>
                    ${esAdmin ? `
                    <td>
                        <button class="btn-editar" onclick="editarFila('${i._id}','${i.producto}','${i.stock}','${i.unidad}','${i.proveedor}','${i.caducidad}','${i.ubicacion}')">Editar</button>
                        <button class="btn-eliminar" onclick="eliminar('${i._id}')">Eliminar</button>
                    </td>` : ""}
                </tr>`;
        });
    }

    function editarFila(id, producto, stock, unidad, proveedor, caducidad, ubicacion) {
        document.getElementById(`producto-${id}`).innerHTML  = `<input type="text" value="${producto}">`;
        document.getElementById(`stock-${id}`).innerHTML     = `<input type="number" value="${stock}">`;
        document.getElementById(`unidad-${id}`).innerHTML    = `<input type="text" value="${unidad}">`;
        document.getElementById(`proveedor-${id}`).innerHTML = `<input type="text" value="${proveedor}">`;
        document.getElementById(`caducidad-${id}`).innerHTML = `<input type="text" value="${caducidad}">`;
        document.getElementById(`ubicacion-${id}`).innerHTML = `<input type="text" value="${ubicacion}">`;
        document.querySelector(`#fila-${id} td:last-child`).innerHTML = `
            <button class="btn-guardar" onclick="guardarEdicion('${id}')">Guardar</button>
            <button class="btn-cancelar" onclick="cargarInsumos()">Cancelar</button>`;
    }

    async function guardarEdicion(id) {
        const datos = {
            producto:  document.querySelector(`#producto-${id} input`).value,
            stock:     document.querySelector(`#stock-${id} input`).value,
            unidad:    document.querySelector(`#unidad-${id} input`).value,
            proveedor: document.querySelector(`#proveedor-${id} input`).value,
            caducidad: document.querySelector(`#caducidad-${id} input`).value,
            ubicacion: document.querySelector(`#ubicacion-${id} input`).value
        };
        await fetch(`/api/insumos/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });
        await cargarInsumos();
    }

    async function agregarInsumo() {
        if (!esAdmin) return;
        const campos = ["producto","stock","unidad","proveedor","caducidad","ubicacion"];
        const datos = {};
        for (let c of campos) {
            datos[c] = document.getElementById(c).value;
            if (!datos[c]) { alert("Completa todos los campos"); return; }
        }
        const res = await fetch("/api/insumos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(datos)
        });
        const json = await res.json();
        alert(json.mensaje);
        campos.forEach(c => document.getElementById(c).value = "");
        await cargarInsumos();
    }

    async function eliminar(id) {
        if (!confirm("¿Eliminar este insumo?")) return;
        await fetch(`/api/insumos/${id}`, { method: "DELETE" });
        await cargarInsumos();
    }
</script>
</body>
</html>
